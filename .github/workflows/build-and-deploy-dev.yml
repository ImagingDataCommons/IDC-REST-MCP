name: Build & deploy (dev)

# Continuous deploy to the dev tier. On every push to main that touches the image, build the
# image ONCE, push it to the shared Artifact Registry tagged by short commit SHA, then deploy
# that build to dev. The same SHA is later promoted to test/prod by promote.yml WITHOUT
# rebuilding (see dev/deployment.md), so this is the only place the image is built.
#
# Requires repo-level Variables BUILD_PROJECT_ID / BUILD_REGION / AR_REPO and repo Secret
# BUILD_SA_KEY (builder SA for BUILD_PROJECT_ID). Path filters mirror what actually changes the
# baked image; use the workflow_dispatch to force-build any commit (e.g. before tagging a
# docs-only commit for release).

on:
  push:
    branches: [main]
    paths:
      - "src/idc_api/**"
      - "Dockerfile"
      - "pyproject.toml"
      - "uv.lock"
      - "dev/cloudbuild.yaml"
      - ".github/workflows/build-and-deploy-dev.yml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-main
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      build_sha: ${{ steps.vars.outputs.sha }}
    steps:
      - uses: actions/checkout@v7

      - name: Resolve short SHA
        id: vars
        run: echo "sha=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.BUILD_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ vars.BUILD_PROJECT_ID }}

      - name: Build & push image (Cloud Build)
        run: |
          IMAGE="${{ vars.BUILD_REGION || 'us-central1' }}-docker.pkg.dev/${{ vars.BUILD_PROJECT_ID }}/${{ vars.AR_REPO || 'idc' }}/idc-api-v3:${{ steps.vars.outputs.sha }}"
          gcloud builds submit --config dev/cloudbuild.yaml --substitutions _IMAGE="$IMAGE"

  deploy-dev:
    needs: build
    uses: ./.github/workflows/deploy.yml
    with:
      environment: dev
      build_sha: ${{ needs.build.outputs.build_sha }}
      target: both
    secrets: inherit
