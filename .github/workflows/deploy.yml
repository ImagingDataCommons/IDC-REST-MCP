name: Deploy to Cloud Run (reusable)

# Reusable deploy job shared by build-and-deploy-dev.yml (dev) and promote.yml (test / prod).
# It never builds — it promotes an image that was already built and pushed to the shared
# Artifact Registry, deploying the SAME immutable digest to whichever tier is requested. This
# is what guarantees test validates the exact bytes prod runs (the DuckDB index is baked
# into the image at build time, so a per-tier rebuild could drift).
#
# Per-tier config comes from the GitHub Environment named by `environment` (dev/test/prod):
#   Secrets:   GCP_PROJECT_ID, GCP_SA_KEY   (deployer SA for that tier's GCP project)
#   Variables: REGION, CPU, MEMORY, CONCURRENCY, MIN_INSTANCES, MAX_INSTANCES,
#              DUCKDB_MEMORY_LIMIT, DUCKDB_THREADS   (all optional; defaults below)
# The shared registry is addressed by repo-level Variables BUILD_PROJECT_ID / BUILD_REGION /
# AR_REPO. See dev/deployment.md for the one-time setup and required IAM.

on:
  workflow_call:
    inputs:
      environment:
        description: "Target GitHub Environment / tier (dev | test | prod)"
        required: true
        type: string
      build_sha:
        description: "Short commit SHA identifying the already-built image (:<sha> tag) to promote"
        required: true
        type: string
      target:
        description: "Which service(s) to deploy (rest | mcp | both)"
        required: false
        type: string
        default: both

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    concurrency:
      group: deploy-${{ inputs.environment }}
      cancel-in-progress: false
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Resolve image digest
        id: img
        run: |
          set -euo pipefail
          REPO_PATH="${{ vars.BUILD_REGION || 'us-central1' }}-docker.pkg.dev/${{ vars.BUILD_PROJECT_ID }}/${{ vars.AR_REPO || 'idc' }}/idc-api-v3"
          # Pin to the immutable digest so every tier runs byte-identical bits, not a moving tag.
          DIGEST=$(gcloud artifacts docker images describe "${REPO_PATH}:${{ inputs.build_sha }}" \
            --format='value(image_summary.fully_qualified_digest)')
          if [ -z "$DIGEST" ]; then
            echo "::error::No image found for tag '${{ inputs.build_sha }}' in ${REPO_PATH}. Build it on main first (or via build-and-deploy-dev.yml's workflow_dispatch)." >&2
            exit 1
          fi
          echo "image=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "Promoting digest: $DIGEST"

      - name: Deploy REST API
        if: ${{ inputs.target == 'rest' || inputs.target == 'both' }}
        run: |
          gcloud run deploy idc-api-v3 \
            --image "${{ steps.img.outputs.image }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "${{ vars.REGION || 'us-central1' }}" \
            --allow-unauthenticated \
            --cpu "${{ vars.CPU || '2' }}" --memory "${{ vars.MEMORY || '4Gi' }}" \
            --concurrency "${{ vars.CONCURRENCY || '40' }}" \
            --min-instances "${{ vars.MIN_INSTANCES || '0' }}" --max-instances "${{ vars.MAX_INSTANCES || '5' }}" \
            --cpu-boost \
            --set-env-vars "IDC_API_DUCKDB_MEMORY_LIMIT=${{ vars.DUCKDB_MEMORY_LIMIT || '3GB' }},IDC_API_DUCKDB_THREADS=${{ vars.DUCKDB_THREADS || '2' }},IDC_API_BUILD=${{ inputs.build_sha }}"

      - name: Deploy MCP service
        if: ${{ inputs.target == 'mcp' || inputs.target == 'both' }}
        run: |
          gcloud run deploy idc-mcp-v3 \
            --image "${{ steps.img.outputs.image }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "${{ vars.REGION || 'us-central1' }}" \
            --allow-unauthenticated \
            --cpu "${{ vars.CPU || '2' }}" --memory "${{ vars.MEMORY || '4Gi' }}" \
            --min-instances "${{ vars.MIN_INSTANCES || '0' }}" --max-instances "${{ vars.MAX_INSTANCES || '5' }}" \
            --command idc-mcp \
            --args=--http,--host,0.0.0.0,--port,8080 \
            --set-env-vars "IDC_API_DUCKDB_MEMORY_LIMIT=${{ vars.DUCKDB_MEMORY_LIMIT || '3GB' }},IDC_API_DUCKDB_THREADS=${{ vars.DUCKDB_THREADS || '2' }},IDC_API_BUILD=${{ inputs.build_sha }}"

      - name: Verify REST API
        if: ${{ inputs.target == 'rest' || inputs.target == 'both' }}
        run: |
          URL=$(gcloud run services describe idc-api-v3 --project "${{ secrets.GCP_PROJECT_ID }}" --region "${{ vars.REGION || 'us-central1' }}" --format='value(status.url)')
          curl -sf "$URL/health"; echo
          {
            echo "### REST API deployed to ${{ inputs.environment }}"
            echo "- URL: $URL"
            echo "- Build: \`${{ inputs.build_sha }}\`"
            echo "- Image: \`${{ steps.img.outputs.image }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Verify MCP service
        if: ${{ inputs.target == 'mcp' || inputs.target == 'both' }}
        run: |
          URL=$(gcloud run services describe idc-mcp-v3 --project "${{ secrets.GCP_PROJECT_ID }}" --region "${{ vars.REGION || 'us-central1' }}" --format='value(status.url)')
          {
            echo "### MCP service deployed to ${{ inputs.environment }}"
            echo "- URL: $URL/mcp"
            echo "- Build: \`${{ inputs.build_sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
